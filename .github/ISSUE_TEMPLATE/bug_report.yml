name: 'Bug report'
description: |
  Submit a bug report about QGIS Base Plugin. Include a reproducible example and 
  detailed environment information. For security vulnerabilities, use the security advisory form instead.
title: '[BUG] <brief description>'
labels: ['bug', 'triage-needed']

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Before submitting, please:
        - Check the [documentation](https://github.com/telekom/qgis_plugin_base/tree/main/docs)
        - Search [existing issues](https://github.com/telekom/qgis_plugin_base/issues) for similar reports
        - For security issues, email security@telekom.de instead of using this form
  
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Describe the bug
      description: Clear and concise description of what is broken
      placeholder: |
        What happened and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the bug
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What should happen instead?
      placeholder: |
        I expected that ...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Error logs or output
      description: |
        Relevant error messages, stack traces, or logs
      placeholder: |
        ```
        error logs here
        ```
      render: shell

  - type: textarea
    attributes:
      label: Screenshots
      description: If applicable, add screenshots (not code - use logs instead)
      placeholder: |
        You can drag and drop images here

  - type: textarea
    attributes:
      label: Environment
      description: |
        Your setup details
      value: |
        - **Python Version**: [e.g., 1.24]
        - **OS/Platform**: [e.g., Ubuntu 22.04, macOS 14]
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: qgis-plugin-base
    attributes:
      label: QGIS Base Plugin Version
      description: What version are you running?
      options: 
        - main (development)
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional context
      description: Any other relevant information
      placeholder: |
        - Related issues/PRs
        - Workarounds you've found
        - Impact on your deployment
        - Configuration snippets (sanitize secrets!)

  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I've checked existing issues and documentation
          required: true
        - label: I'm reporting a bug, not a security vulnerability
          required: true
        - label: I've included all relevant environment information
          required: true
        - label: I've included steps to reproduce the issue
          required: true